
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap {
    background: #0d1117;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid #21262d;
    font-family: 'JetBrains Mono', monospace, sans-serif;
  }
  .toprow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .label { font-size: 11px; color: #8b949e; letter-spacing: 0.1em; text-transform: uppercase; }
  .score-box { font-size: 11px; color: #3fb950; }
  canvas {
    display: block;
    width: 100%;
    border-radius: 6px;
    background: #161b22;
    border: 1px solid #21262d;
    image-rendering: pixelated;
  }
  .months {
    display: flex;
    margin-top: 6px;
    padding: 0 2px;
  }
  .month-lbl { font-size: 9px; color: #484f58; flex: 1; text-align: left; }
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-end;
  }
  .legend span { font-size: 10px; color: #484f58; }
  .leg-cell { width: 10px; height: 10px; border-radius: 2px; }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  .btn {
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #c9d1d9;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover { background: #21262d; }
  .btn.active { border-color: #3fb950; color: #3fb950; }
  .speed-lbl { font-size: 10px; color: #484f58; margin-left: auto; }
</style>

<div class="wrap">
  <div class="toprow">
    <span class="label">Contribution Activity</span>
    <span class="score-box">Score: <span id="score">0</span> &nbsp;|&nbsp; Length: <span id="slen">3</span></span>
  </div>
  <canvas id="c" height="120"></canvas>
  <div class="months" id="months"></div>
  <div class="legend">
    <span>Less</span>
    <div class="leg-cell" style="background:#161b22;border:1px solid #21262d"></div>
    <div class="leg-cell" style="background:#0e4429"></div>
    <div class="leg-cell" style="background:#006d32"></div>
    <div class="leg-cell" style="background:#26a641"></div>
    <div class="leg-cell" style="background:#39d353"></div>
    <span>More</span>
  </div>
  <div class="controls">
    <button class="btn active" id="btnPlay" onclick="togglePlay()">Pause</button>
    <button class="btn" onclick="resetGame()">Reset</button>
    <span class="speed-lbl">Speed:
      <button class="btn" onclick="setSpeed(200)" style="padding:3px 8px">Slow</button>
      <button class="btn" onclick="setSpeed(100)" style="padding:3px 8px">Fast</button>
    </span>
  </div>
</div>

<script>
const COLS = 52, ROWS = 7;
const COLORS = ['#161b22','#0e4429','#006d32','#26a641','#39d353'];
const SNAKE_COL = '#58a6ff';
const SNAKE_HEAD = '#ffffff';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let grid = [], snake = [], dir = {x:1,y:0}, nextDir = {x:1,y:0};
let eaten = new Set(), score = 0, interval = null, speed = 130, running = true;

function buildGrid() {
  grid = [];
  for (let c = 0; c < COLS; c++) {
    grid[c] = [];
    for (let r = 0; r < ROWS; r++) {
      const v = Math.random();
      grid[c][r] = v < 0.35 ? 0 : v < 0.55 ? 1 : v < 0.72 ? 2 : v < 0.87 ? 3 : 4;
    }
  }
}

function initSnake() {
  snake = [{x:5,y:3},{x:4,y:3},{x:3,y:3}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  eaten.clear(); score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('slen').textContent = 3;
}

function draw() {
  const W = canvas.offsetWidth || 600;
  canvas.width = W;
  const cw = Math.floor(W / COLS);
  const ch = Math.floor(120 / ROWS);
  ctx.clearRect(0, 0, W, 120);

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const key = c+','+r;
      let col;
      if (eaten.has(key)) {
        col = '#161b22';
      } else {
        col = COLORS[grid[c][r]];
      }
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(c*cw+1, r*ch+1, cw-2, ch-2, 2);
      ctx.fill();
    }
  }

  for (let i = snake.length-1; i >= 0; i--) {
    const s = snake[i];
    const isHead = i === 0;
    ctx.fillStyle = isHead ? SNAKE_HEAD : SNAKE_COL;
    ctx.beginPath();
    ctx.roundRect(s.x*cw+1, s.y*ch+1, cw-2, ch-2, isHead ? 3 : 2);
    ctx.fill();
    if (isHead) {
      ctx.fillStyle = '#0d1117';
      const ew = Math.max(2, cw/6);
      const eh = Math.max(2, ch/5);
      ctx.beginPath();
      ctx.arc(s.x*cw + cw*0.65, s.y*ch + ch*0.35, ew, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function step() {
  dir = nextDir;
  const head = snake[0];
  let nx = (head.x + dir.x + COLS) % COLS;
  let ny = (head.y + dir.y + ROWS) % ROWS;

  const hitSelf = snake.slice(1).some(s => s.x===nx && s.y===ny);
  if (hitSelf) { resetGame(); return; }

  const key = nx+','+ny;
  const cellVal = grid[nx][ny];
  const isFood = !eaten.has(key) && cellVal > 0;

  snake.unshift({x:nx,y:ny});
  if (isFood) {
    eaten.add(key);
    score += cellVal * 10;
    document.getElementById('score').textContent = score;
    document.getElementById('slen').textContent = snake.length;
  } else {
    snake.pop();
  }

  if (eaten.size === COLS*ROWS) { resetGame(); }
  draw();
}

function setSpeed(s) {
  speed = s;
  if (running) { clearInterval(interval); interval = setInterval(step, speed); }
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('btnPlay');
  if (running) {
    interval = setInterval(step, speed);
    btn.textContent = 'Pause'; btn.classList.add('active');
  } else {
    clearInterval(interval);
    btn.textContent = 'Play'; btn.classList.remove('active');
  }
}

function resetGame() {
  buildGrid(); initSnake(); draw();
}

function buildMonths() {
  const mDiv = document.getElementById('months');
  mDiv.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('span');
    s.className = 'month-lbl';
    s.textContent = MONTHS[i];
    mDiv.appendChild(s);
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight' && dir.x!=-1) nextDir={x:1,y:0};
  else if (e.key==='ArrowLeft' && dir.x!=1) nextDir={x:-1,y:0};
  else if (e.key==='ArrowDown' && dir.y!=-1) nextDir={x:0,y:1};
  else if (e.key==='ArrowUp' && dir.y!=1) nextDir={x:0,y:-1};
});

buildGrid();
initSnake();
buildMonths();
draw();
interval = setInterval(step, speed);
</script>
